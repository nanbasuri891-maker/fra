<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>フラ AIエージェント</title>
    <style>
        :root {
            --primary-color: #2f9e8f;
            --dark-pink: #227b6f;
            --text-color: #2b2b2b;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #0b0f19;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            color: var(--text-color);
        }
        /* ===== VTuber風：フラをスマホ画面いっぱいに表示するステージ ===== */
        #stage {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 480px;
            max-height: 960px;
            margin: 0 auto;
            overflow: hidden;
            background: #0b0f19;
        }
        .avatar-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        /* 
           【改善ポイント】
           opacity（不透明度）と visibility（表示状態）を同時にコントロールし、
           さらに z-index（重なり順）を制御することで、裏に隠れた動画が画面を遮るのを防ぎます。
        */
        .avatar-media {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            visibility: hidden;
            z-index: 1;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
            pointer-events: none;
        }
        /* アクティブな素材だけを一番手前に表示し、不透明にします */
        .avatar-media.active { 
            opacity: 1; 
            visibility: visible;
            z-index: 2;
        }
        /* ===== 上部：名前・ステータス（画面上に重ねるオーバーレイ） ===== */
        .top-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 22px 24px 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 100%);
            z-index: 5;
            text-align: center;
        }
        .agent-name {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin: 0 0 4px 0;
            letter-spacing: 0.08em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .agent-status {
            display: inline-block;
            font-size: 11px;
            color: #fff;
            letter-spacing: 0.08em;
            padding: 3px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(6px);
        }
        .agent-status.talking { background: rgba(255,107,139,0.35); }
        .agent-status.listening { background: rgba(130,201,155,0.35); }
        /* ===== 下部：吹き出し＋入力バー（画面下に重ねるオーバーレイ） ===== */
        .bottom-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 40px 18px 22px;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 100%);
            z-index: 5;
        }
        .chat-bubble {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(47, 158, 143, 0.2);
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 14px;
            color: #444;
            max-width: 100%;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            line-height: 1.6;
            min-height: 48px;
            display: flex;
            align-items: center;
            text-align: left;
        }
        /* ===== LINE風の入力バー ===== */
        .input-bar {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 8px;
            background: rgba(255, 255, 255, 0.92);
            border: 1.5px solid rgba(255,255,255,0.5);
            border-radius: 28px;
            padding: 6px 6px 6px 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-bar:focus-within {
            border-color: var(--primary-color);
        }
        #user-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            padding: 10px 0;
            color: var(--text-color);
        }
        #user-input::placeholder { color: #a3a3a3; }
        #action-btn {
            flex-shrink: 0;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 17px;
            background-color: #eef2f0;
            color: #777;
            transition: all 0.2s ease;
        }
        #action-btn:active { transform: scale(0.92); }
        #action-btn.has-text {
            background-color: var(--primary-color);
            color: #fff;
        }
        #action-btn.recording {
            background-color: #82c99b;
            color: white;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        /* ===== スタート画面（自動再生ブロック回避のオーバーレイ） ===== */
        .start-overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        .start-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .start-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(47, 158, 143, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.08em;
        }
        .start-btn:hover {
            background-color: #268d7f;
            transform: translateY(-2px);
        }
        .start-btn:active { transform: translateY(0); }
    </style>
</head>
<body>
<div id="stage">
    <!-- フラ本体：画面いっぱいのVTuber表示 -->
    <div class="avatar-container" id="avatar-container">
        <!-- 1. 静止画 -->
        <img id="img-still" class="avatar-media active" src="fura_still.png" alt="フラ">
        <!-- 2. 通常おしゃべり動画 -->
        <video id="video-speak" class="avatar-media" src="fura_talk.mp4" loop muted playsinline
